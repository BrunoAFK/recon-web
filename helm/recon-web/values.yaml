api:
  image:
    repository: ghcr.io/brunoafk/recon-web/api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: {}
    # GOOGLE_CLOUD_API_KEY: ""
    # MAX_CONCURRENCY: "8"
    # MAX_CONCURRENT_SCANS: "3"

web:
  image:
    repository: ghcr.io/brunoafk/recon-web/web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: ""
  host: recon.example.com
  tls: false
  annotations: {}

scanner:
  enabled: false
  schedule: "0 0 * * *"
  urls: []
  image:
    repository: ghcr.io/brunoafk/recon-web/cli
    tag: latest

notifications:
  telegram:
    enabled: false
    botToken: ""
    chatId: ""
  email:
    enabled: false
    smtpHost: ""
    smtpPort: "587"
    smtpUser: ""
    smtpPass: ""
    notifyEmail: ""

auth:
  # Provider: "local", "firebase", or "" (disabled)
  provider: ""
  # Required for local auth (min 32 chars)
  jwtSecret: ""
  # One-time token for creating first superadmin via API
  setupToken: ""
  registrationOpen: true
  appUrl: ""
  # Firebase (only when provider=firebase)
  firebase:
    projectId: ""
    apiKey: ""
    serviceAccountPath: ""
  # Daily scan limits (0 = unlimited)
  scanLimits:
    global: 0
    user: 0
  # Max concurrent scans server-wide
  maxConcurrentScans: 3
  # Superadmin panel column visibility
  superadminView:
    email: true
    lastLogin: true
    dailyScans: true
    scannedPages: true
  # Demo scan URL (shown to unauthenticated users)
  demoScanUrl: "https://example.com"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce
