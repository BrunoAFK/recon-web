# Remote images — pulls pre-built images from GHCR.
# Usage: docker compose -f docker-compose.remote.yml up
#
# Available images:
#   docker pull ghcr.io/brunoafk/recon-web/api:latest
#   docker pull ghcr.io/brunoafk/recon-web/web:latest
#   docker pull ghcr.io/brunoafk/recon-web/cli:latest
#
# Override with REGISTRY and TAG env vars if using a different registry.

services:
  api:
    image: ${REGISTRY:-ghcr.io/brunoafk/recon-web}/api:${TAG:-latest}
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - scan-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    restart: unless-stopped

  web:
    image: ${REGISTRY:-ghcr.io/brunoafk/recon-web}/web:${TAG:-latest}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_UPSTREAM=http://api:3000
    restart: unless-stopped

  cli:
    image: ${REGISTRY:-ghcr.io/brunoafk/recon-web}/cli:${TAG:-latest}
    env_file: .env
    volumes:
      - scan-data:/app/data
    profiles: ["cli"]

volumes:
  scan-data:
