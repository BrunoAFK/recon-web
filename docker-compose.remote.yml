# Remote images — pulls pre-built images from GHCR.
# Usage: docker compose -f docker-compose.remote.yml up
#
# Set REGISTRY to your GitHub Container Registry path, e.g.:
#   export REGISTRY=ghcr.io/myuser/recon-web
# Images are pushed by CI on every merge to main.

services:
  api:
    image: ${REGISTRY:-ghcr.io/recon-web/recon-web}-api:${TAG:-latest}
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - scan-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    restart: unless-stopped

  web:
    image: ${REGISTRY:-ghcr.io/recon-web/recon-web}-web:${TAG:-latest}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_UPSTREAM=http://api:3000
    restart: unless-stopped

  cli:
    image: ${REGISTRY:-ghcr.io/recon-web/recon-web}-cli:${TAG:-latest}
    env_file: .env
    profiles: ["cli"]

volumes:
  scan-data:
