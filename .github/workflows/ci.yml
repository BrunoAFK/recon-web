name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/brunoafk/recon-web
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # aquasec/trivy 0.69.3 — pinned by digest, same image as .gitlab-ci.yml
  TRIVY_IMAGE: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  TRIVY_SEVERITY: CRITICAL,HIGH

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ── Stage 1: Lint + Typecheck ──────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build core (required for workspace type resolution)
        run: npx tsc -b packages/core

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ── Stage 2: Tests ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build core (required for workspace resolution)
        run: npx tsc -b packages/core

      - run: npm test

  # ── Stage 3: Dependency audit ──────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            ${{ env.TRIVY_IMAGE }} \
            fs --severity ${TRIVY_SEVERITY} --exit-code 1 --ignore-unfixed /src

  # ── Stage 4: Build + Scan + Push (only on main) ────────────
  docker-api:
    name: Docker — API
    needs: [lint, test, audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/api:build-${{ github.run_id }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Trivy scan API image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.TRIVY_IMAGE }} \
            image --severity ${TRIVY_SEVERITY} --exit-code 1 --ignore-unfixed \
            ${{ env.IMAGE_PREFIX }}/api:build-${{ github.run_id }}

      - name: Push API image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/api:build-${{ github.run_id }} \
                     ${{ env.IMAGE_PREFIX }}/api:latest
          docker push ${{ env.IMAGE_PREFIX }}/api:build-${{ github.run_id }}
          docker push ${{ env.IMAGE_PREFIX }}/api:latest

  docker-web:
    name: Docker — Web
    needs: [lint, test, audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/web:build-${{ github.run_id }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Trivy scan Web image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.TRIVY_IMAGE }} \
            image --severity ${TRIVY_SEVERITY} --exit-code 1 --ignore-unfixed \
            ${{ env.IMAGE_PREFIX }}/web:build-${{ github.run_id }}

      - name: Push Web image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/web:build-${{ github.run_id }} \
                     ${{ env.IMAGE_PREFIX }}/web:latest
          docker push ${{ env.IMAGE_PREFIX }}/web:build-${{ github.run_id }}
          docker push ${{ env.IMAGE_PREFIX }}/web:latest

  docker-cli:
    name: Docker — CLI
    needs: [lint, test, audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/cli/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/cli:build-${{ github.run_id }}
          cache-from: type=gha,scope=cli
          cache-to: type=gha,mode=max,scope=cli

      - name: Trivy scan CLI image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.TRIVY_IMAGE }} \
            image --severity ${TRIVY_SEVERITY} --exit-code 1 --ignore-unfixed \
            ${{ env.IMAGE_PREFIX }}/cli:build-${{ github.run_id }}

      - name: Push CLI image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/cli:build-${{ github.run_id }} \
                     ${{ env.IMAGE_PREFIX }}/cli:latest
          docker push ${{ env.IMAGE_PREFIX }}/cli:build-${{ github.run_id }}
          docker push ${{ env.IMAGE_PREFIX }}/cli:latest
