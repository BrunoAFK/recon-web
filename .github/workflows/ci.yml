name: CI

on:
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/brunoafk/recon-web
  NODE_VERSION: "24"
  # aquasec/trivy 0.69.3 — pinned by digest
  TRIVY_IMAGE: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  TRIVY_SEVERITY_FS: CRITICAL,HIGH
  TRIVY_SEVERITY_IMAGE: CRITICAL

permissions:
  contents: write   # write needed for softprops/action-gh-release to attach SBOM
  packages: write
  security-events: write
  id-token: write   # required for cosign keyless OIDC signing

jobs:
  # ── Stage 1: Lint + Typecheck ──────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build core (required for workspace type resolution)
        run: npx tsc -b packages/core

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ── Stage 2: Tests ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build core (required for workspace resolution)
        run: npx tsc -b packages/core

      - run: npm test

  # ── Stage 3: Dependency audit ──────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            ${{ env.TRIVY_IMAGE }} \
            fs --severity ${TRIVY_SEVERITY_FS} --exit-code 1 --ignore-unfixed /src

  # ── Stage 4: Docker Build + Trivy Scan (always after quality) ──
  docker-build:
    name: Docker Build & Scan
    needs: [lint, test, audit]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, web, cli]
        include:
          - image: api
            dockerfile: packages/api/Dockerfile
          - image: web
            dockerfile: packages/web/Dockerfile
          - image: cli
            dockerfile: packages/cli/Dockerfile
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:ci-${{ github.run_id }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Trivy scan ${{ matrix.image }} image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.TRIVY_IMAGE }} \
            image --severity ${TRIVY_SEVERITY_IMAGE} --exit-code 1 --ignore-unfixed \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:ci-${{ github.run_id }}

  # ── Stage 5: Push to registry (only on release) ────────────
  docker-push:
    name: Push Docker Images
    needs: [docker-build]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, web, cli]
        include:
          - image: api
            dockerfile: packages/api/Dockerfile
          - image: web
            dockerfile: packages/web/Dockerfile
          - image: cli
            dockerfile: packages/cli/Dockerfile
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.event.release.tag_name }}
          cosign sign --yes \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.event.release.tag_name }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json
          upload-artifact: false

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-${{ matrix.image }}.spdx.json
