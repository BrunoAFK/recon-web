name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly — what did you expect vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Enter ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web UI
        - REST API
        - CLI
        - Specific handler/check
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: input
    id: handler
    attributes:
      label: Handler name (if applicable)
      placeholder: e.g. ssl, dns, sitemap

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04 / Windows 11
        - Node.js: 24.x
        - Browser: Chrome 130
        - Deployment: Docker / source / Helm
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      placeholder: Paste screenshots, error messages, or relevant log output.
